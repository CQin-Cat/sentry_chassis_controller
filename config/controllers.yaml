controller:
  sentry_chassis_controller:
    type: sentry_chassis_controller/SentryChassisController
    #when true, it is global coordinate system mode, otherwise it is the chassis coordinate system mode.
    odomMode: true
    spinMode: false
    lockMode: true
    wheel_track: 0.362
    wheel_base: 0.362
    wheel_radius: 0.055
    cmd_vel_timeout: 0.5
#    left_front_pivot_offset:  2.340
#    right_front_pivot_offset: -0.285
#    left_back_pivot_offset: -0.259
#    right_back_pivot_offset: 2.330

  joint_state_controller:
    type: joint_state_controller/JointStateController
    publish_rate: 50